name: 🔥 BULLET 24/7 RDP VISIBLE SCRIPTS

on:
  workflow_dispatch:
  schedule:
    - cron: '*/25 * * * *'

jobs:
  rdp-runner:
    runs-on: windows-latest
    timeout-minutes: 340
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: 🔧 RDP Configuration
        shell: pwsh
        run: |
          Write-Host "🔧 Configuring RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="Bullet-RDP" 2>$null
          netsh advfirewall firewall add rule name="Bullet-RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force
          Write-Host "✅ RDP configured"
      
      - name: 👤 Create bullethu User
        shell: pwsh
        run: |
          Write-Host "👤 Creating user bullethu..."
          $username = "bullethu"
          $password = "Bullet@123"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
          }
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires -ErrorAction Stop
          Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username -ErrorAction SilentlyContinue
          Write-Host "✅ User created: $username / $password"
      
      - name: 🌐 Tailscale Setup
        shell: pwsh
        run: |
          Write-Host "🌐 Installing Tailscale..."
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installer = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installer -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installer`"", "/quiet", "/norestart" -Wait
          Remove-Item $installer -Force
          Write-Host "✅ Tailscale installed"
      
      - name: 🔗 Tailscale Connect
        shell: pwsh
        run: |
          Write-Host "🔗 Connecting to Tailscale..."
          $tsExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $retries = 0
          while (-not (Test-Path $tsExe) -and $retries -lt 10) {
              Start-Sleep -Seconds 2
              $retries++
          }
          if (-not (Test-Path $tsExe)) {
              Write-Error "Tailscale not found"
              exit 1
          }
          & $tsExe up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=bullet-rdp-${{ github.run_number }}
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 15) {
              $tsIP = & $tsExe ip -4
              if ($tsIP) { break }
              Start-Sleep -Seconds 3
              $retries++
          }
          if (-not $tsIP) {
              Write-Error "Failed to get IP"
              exit 1
          }
          Write-Host "✅ Connected: $tsIP"
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
      
      - name: 🐍 Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install Dependencies
        shell: pwsh
        run: |
          Write-Host "📦 Installing Python packages..."
          python -m pip install --upgrade pip --quiet
          pip install requests colorama --quiet
          Write-Host "✅ Dependencies installed"
      
      - name: 🔐 Set Environment Variables
        shell: pwsh
        run: |
          Write-Host "🔐 Setting environment variables..."
          
          $token = "${{ secrets.TG_TOKEN }}"
          $chatId = "${{ secrets.TG_ID }}"
          
          # Set for current session
          [Environment]::SetEnvironmentVariable("TG_TOKEN", $token, "Process")
          [Environment]::SetEnvironmentVariable("TG_ID", $chatId, "Process")
          
          # Set for system (persistent)
          [Environment]::SetEnvironmentVariable("TG_TOKEN", $token, "Machine")
          [Environment]::SetEnvironmentVariable("TG_ID", $chatId, "Machine")
          
          Write-Host "✅ Environment variables set"
      
      - name: 🚀 Start Python Scripts (VISIBLE)
        shell: pwsh
        run: |
          Write-Host "`n🚀 Starting Python scripts in VISIBLE windows..."
          
          # Create batch files to keep windows open
          
          # Combined Checker
          if (Test-Path "bullet_combined_checker.py") {
              $batchContent = @"
@echo off
title BULLET COMBINED CHECKER
color 0A
echo Starting Bullet Combined Checker...
python bullet_combined_checker.py
pause
"@
              Set-Content "start_combined.bat" -Value $batchContent
              Start-Process cmd.exe -ArgumentList "/c", "start_combined.bat"
              Write-Host "✅ Started: Combined Checker (VISIBLE)"
          }
          
          # 4L Checker
          if (Test-Path "4L__2___1_.py") {
              $batchContent = @"
@echo off
title BULLET 4L CHECKER
color 0E
echo Starting 4L Username Checker...
python 4L__2___1_.py
pause
"@
              Set-Content "start_4L.bat" -Value $batchContent
              Start-Process cmd.exe -ArgumentList "/c", "start_4L.bat"
              Write-Host "✅ Started: 4L Checker (VISIBLE)"
          }
          
          # EUREX FAST
          if (Test-Path "𝐄𝐔𝐑𝐄𝐗_𝐅𝐀𝐒𝐓_𝐅𝐈𝐋𝐄__1_.py") {
              $batchContent = @"
@echo off
title BULLET EUREX FAST
color 0B
echo Starting EUREX Fast Checker...
python 𝐄𝐔𝐑𝐄𝐗_𝐅𝐀𝐒𝐓_𝐅𝐈𝐋𝐄__1_.py
pause
"@
              Set-Content "start_eurex.bat" -Value $batchContent
              Start-Process cmd.exe -ArgumentList "/c", "start_eurex.bat"
              Write-Host "✅ Started: EUREX Fast (VISIBLE)"
          }
          
          # speedxeurex
          if (Test-Path "speedxeurex.py") {
              $batchContent = @"
@echo off
title BULLET SPEEDXEUREX
color 0D
echo Starting SpeedXEurex Checker...
python speedxeurex.py
pause
"@
              Set-Content "start_speedx.bat" -Value $batchContent
              Start-Process cmd.exe -ArgumentList "/c", "start_speedx.bat"
              Write-Host "✅ Started: SpeedXEurex (VISIBLE)"
          }
          
          Start-Sleep -Seconds 5
          
          # Count windows
          $cmdWindows = @(Get-Process cmd -ErrorAction SilentlyContinue)
          Write-Host "`n📊 CMD Windows opened: $($cmdWindows.Count)"
          Write-Host "✅ All scripts started in VISIBLE windows!"
      
      - name: 📺 Display Connection Info
        shell: pwsh
        run: |
          Write-Host "`n$('='*70)"
          Write-Host "🔥 BULLET 24/7 RDP - ACTIVE" -ForegroundColor Green
          Write-Host "$('='*70)"
          Write-Host "🌐 Tailscale IP : $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "👤 Username     : bullethu" -ForegroundColor Yellow
          Write-Host "🔑 Password     : Bullet@123" -ForegroundColor Yellow
          Write-Host "⚡ Port         : 3389" -ForegroundColor Magenta
          Write-Host "$('='*70)"
          Write-Host "🖥️ Scripts Mode : VISIBLE WINDOWS" -ForegroundColor Green
          Write-Host "📊 Monitor      : Connect RDP to see" -ForegroundColor Green
          Write-Host "🔄 Auto-Restart : 25 min" -ForegroundColor Green
          Write-Host "$('='*70)`n"
          Write-Host "💡 TIP: Connect via RDP to see all checker windows!" -ForegroundColor Yellow
          Write-Host "$('='*70)`n"
      
      - name: 💾 Keep Alive Loop
        shell: pwsh
        run: |
          $startTime = Get-Date
          $maxMinutes = 330
          
          Write-Host "🔄 Keep-alive loop started"
          Write-Host "⏱️ Runtime: $maxMinutes minutes`n"
          
          while ($true) {
              $elapsed = ((Get-Date) - $startTime).TotalMinutes
              
              if ($elapsed -ge $maxMinutes) {
                  Write-Host "`n⏰ Timeout approaching..."
                  break
              }
              
              if ([math]::Floor($elapsed) % 5 -eq 0 -and $elapsed -gt 0) {
                  $remaining = [math]::Floor($maxMinutes - $elapsed)
                  $cmdCount = @(Get-Process cmd -ErrorAction SilentlyContinue).Count
                  $pythonCount = @(Get-Process python -ErrorAction SilentlyContinue).Count
                  
                  Write-Host "[$(Get-Date -Format 'HH:mm:ss')] ✅ Active | $([math]::Floor($elapsed))m / ${remaining}m | CMD: $cmdCount | Python: $pythonCount"
              }
              
              Start-Sleep -Seconds 30
          }
          
          Write-Host "✅ Loop completed"
      
      - name: 🔄 Trigger Next Workflow
        if: always()
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "`n🔄 Triggering next workflow..."
          
          $headers = @{
              Authorization = "token ${{ secrets.GITHUB_TOKEN }}"
              Accept = "application/vnd.github.v3+json"
          }
          
          $body = @{ ref = "${{ github.ref }}" } | ConvertTo-Json
          
          try {
              $uri = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-visible.yml/dispatches"
              Invoke-RestMethod -Uri $uri -Method POST -Headers $headers -Body $body -ContentType "application/json" -ErrorAction Stop
              Write-Host "✅ Next workflow triggered!"
          } catch {
              Write-Host "ℹ️ Cron will start next instance"
          }
          
